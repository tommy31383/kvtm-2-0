<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KVTM 2.0 — Sort Blossom Level Editor v2</title>

<!-- Shared engine modules (single source of truth) -->
<link rel="stylesheet" href="../engine/sort_blossom.css">
<script src="../engine/sort_blossom_engine.js"></script>
<script src="../engine/sort_blossom_render.js"></script>
<script src="../engine/sort_blossom_data.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1f2e; color: #e8e4d8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; user-select: none;
  }
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  .toolbar {
    background: #2a2f3e; border-bottom: 1px solid #3a3f4e;
    padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .toolbar h1 { font-size: 16px; color: #FFD700; margin-right: 12px; }
  .toolbar button {
    background: #3a3f4e; color: #e8e4d8; border: 1px solid #4a4f5e;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .toolbar button:hover { background: #4a4f5e; }
  .toolbar button.primary { background: #FFD700; color: #1a1f2e; font-weight: 700; border-color: #FFD700; }
  .toolbar .sep { width: 1px; height: 24px; background: #4a4f5e; margin: 0 4px; }
  .toolbar .level-picker { display: flex; gap: 4px; align-items: center; }
  .toolbar select {
    background: #3a3f4e; color: #e8e4d8; border: 1px solid #4a4f5e;
    padding: 5px 8px; border-radius: 4px; font-size: 13px;
  }

  .main { display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }
  .editor-area { background: #243340; overflow-y: auto; padding: 24px; }
  .pots-grid {
    display: flex; flex-wrap: wrap; gap: 24px 18px;
    justify-content: center; align-items: flex-end;
    max-width: 820px; margin: 0 auto;
  }
  .pot-cell-wrap { position: relative; }
  .pot-cell-wrap .delete-btn {
    position: absolute; top: -6px; right: -6px;
    width: 22px; height: 22px; background: #E74C3C; color: white;
    border: none; border-radius: 50%; cursor: pointer; font-size: 13px;
    line-height: 1; display: none; z-index: 50;
  }
  .pot-cell-wrap:hover .delete-btn { display: block; }
  .pot-cell-wrap .pot-index-label {
    position: absolute;
    top: -22px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.4); color: #ccc;
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
    white-space: nowrap;
  }
  .add-pot-btn {
    width: var(--sb-pot-w); height: 290px;
    border: 2px dashed #4a4f5e; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: #6a6f7e; font-size: 36px; cursor: pointer;
    background: rgba(255,255,255,0.02);
  }
  .add-pot-btn:hover { border-color: #FFD700; color: #FFD700; }

  .side {
    background: #2a2f3e; border-left: 1px solid #3a3f4e;
    overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .panel { background: #1f2433; border: 1px solid #3a3f4e; border-radius: 8px; padding: 12px; }
  .panel h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: #FFD700; margin-bottom: 10px;
  }
  .field {
    display: grid; grid-template-columns: 100px 1fr; gap: 8px;
    align-items: center; margin-bottom: 8px; font-size: 13px;
  }
  .field label { color: #a8a8a8; font-size: 12px; }
  .field input {
    background: #3a3f4e; color: #e8e4d8; border: 1px solid #4a4f5e;
    padding: 5px 8px; border-radius: 4px; font-size: 13px; width: 100%;
  }
  .stat {
    display: grid; grid-template-columns: 1fr auto; gap: 6px;
    padding: 6px 0; border-bottom: 1px dashed #3a3f4e; font-size: 13px;
  }
  .stat:last-child { border-bottom: none; }
  .stat .v { color: #FFD700; font-weight: 700; font-family: monospace; }
  .palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .swatch {
    background: #3a3f4e; border: 2px solid transparent; border-radius: 8px;
    padding: 6px 4px; cursor: pointer; text-align: center;
  }
  .swatch:hover { transform: scale(1.06); border-color: #4a4f5e; }
  .swatch.active { border-color: #FFD700; background: #4a4f5e; }
  .swatch img { width: 36px; height: 36px; object-fit: contain; display: block; margin: 0 auto 2px; }
  .swatch .lbl { font-size: 10px; color: #ccc; font-family: monospace; }
  .tool-mode { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .tool-mode button {
    flex: 1; background: #3a3f4e; border: 1px solid #4a4f5e; color: #ccc;
    padding: 6px 4px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .tool-mode button.active { background: #FFD700; color: #1a1f2e; border-color: #FFD700; font-weight: 700; }
  .difficulty-meter { height: 8px; background: #3a3f4e; border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .difficulty-meter .fill { height: 100%; background: linear-gradient(90deg,#4ade80,#facc15,#ef4444); transition: width .25s ease; }
  .log {
    background: #0f1422; color: #80ff80; font-family: monospace;
    font-size: 11px; padding: 8px; border-radius: 4px;
    max-height: 120px; overflow-y: auto; line-height: 1.4;
  }

  /* ── PLAY OVERLAY — uses phone-frame to match in-game look ── */
  .play-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  .play-overlay.show { display: flex; }
  .play-phone-frame {
    width: 390px; height: 844px;
    background: linear-gradient(180deg, #f5e8c4 0%, #d8c39e 100%);
    border-radius: 36px;
    border: 4px solid #3a2a1a;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .play-topbar {
    background: rgba(122,146,168,0.92);
    color: #fff;
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Gloria Hallelujah', cursive;
    border-bottom: 2px solid #3a2a1a;
  }
  .play-topbar h3 { font-size: 16px; }
  .play-topbar .play-close-btn {
    background: rgba(255,255,255,0.2); color: #fff;
    border: 1px solid rgba(255,255,255,0.3); padding: 4px 10px;
    border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .play-stats {
    background: rgba(255,255,255,0.6);
    padding: 8px 14px;
    display: flex; justify-content: space-between;
    color: #3a2a1a; font-size: 13px; font-weight: 700;
    border-bottom: 1px solid rgba(58,42,26,0.2);
  }
  .play-pots-area {
    flex: 1; overflow-y: auto;
    padding: 18px 8px 8px;
    display: flex; flex-wrap: wrap; gap: 12px;
    justify-content: center; align-items: flex-end;
  }
  .play-actions {
    background: rgba(122,146,168,0.92);
    padding: 10px 14px;
    display: flex; gap: 8px;
    border-top: 2px solid #3a2a1a;
  }
  .play-actions button {
    flex: 1; background: #fff; color: #3a2a1a; border: 2px solid #3a2a1a;
    padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px;
    font-family: 'Gloria Hallelujah', cursive;
  }
  .play-actions button.primary { background: #FFD700; }
</style>
</head>
<body>

<div class="app">

  <div class="toolbar">
    <h1>🌹 Sort Blossom — Level Editor v2</h1>
    <div class="level-picker">
      Level:
      <select id="level-select"></select>
      <button id="btn-prev">◀</button>
      <button id="btn-next">▶</button>
    </div>
    <div class="sep"></div>
    <button id="btn-new">📄 New</button>
    <button id="btn-load">📂 Load JSON</button>
    <button id="btn-save" class="primary">💾 Save All</button>
    <button id="btn-export-clip">📋 Copy current</button>
    <button id="btn-push" title="Push to localStorage (game reads same key)">⬆ Push to Game</button>
    <div class="sep"></div>
    <button id="btn-solve">🧠 Solve</button>
    <button id="btn-play" class="primary">▶ Test Play</button>
    <button id="btn-validate">✔ Validate</button>
  </div>

  <div class="main">

    <div class="editor-area">
      <div class="pots-grid" id="pots-grid"></div>
    </div>

    <div class="side">

      <div class="panel">
        <h3>📋 Properties</h3>
        <div class="field"><label>ID</label><input id="f-id" type="number" min="1" value="1"></div>
        <div class="field"><label>Name</label><input id="f-name" type="text" value="New Level"></div>
        <div class="field"><label>Move Limit</label><input id="f-moves" type="number" min="1" value="15"></div>
      </div>

      <div class="panel">
        <h3>⭐ Star Thresholds</h3>
        <div class="field"><label>3⭐ ≤</label><input id="f-star3" type="number" min="1" value="6"></div>
        <div class="field"><label>2⭐ ≤</label><input id="f-star2" type="number" min="1" value="9"></div>
        <div class="field"><label>1⭐ ≤</label><input id="f-star1" type="number" min="1" value="12"></div>
      </div>

      <div class="panel">
        <h3>🎨 Flower Palette</h3>
        <div class="tool-mode">
          <button id="mode-add" class="active">➕ Add</button>
          <button id="mode-remove">🗑 Remove</button>
        </div>
        <div class="palette" id="palette"></div>
        <div style="font-size:11px;color:#888;margin-top:8px;line-height:1.4;">
          Click 3 active slots (L/C/R) hoặc queue cell. <br>Mỗi màu phải bội số của 3.
        </div>
      </div>

      <div class="panel">
        <h3>🧠 Solver</h3>
        <div class="stat"><span>Min moves</span><span class="v" id="s-min">–</span></div>
        <div class="stat"><span>Solvable</span><span class="v" id="s-solvable">–</span></div>
        <div class="stat"><span>States</span><span class="v" id="s-states">–</span></div>
        <div class="stat"><span>Difficulty</span><span class="v" id="s-diff">–</span></div>
        <div class="difficulty-meter"><div class="fill" id="s-meter" style="width:0%"></div></div>
        <button id="btn-apply-stars" style="margin-top:10px;width:100%;background:#3a3f4e;color:#FFD700;border:1px dashed #FFD700;padding:6px;border-radius:4px;cursor:pointer;font-size:12px;">Apply suggested stars</button>
      </div>

      <div class="panel">
        <h3>📜 Log</h3>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ TEST PLAY OVERLAY (phone frame) ═══ -->
<div class="play-overlay" id="play-overlay">
  <div class="play-phone-frame">
    <div class="play-topbar">
      <h3 id="play-title">Level</h3>
      <button class="play-close-btn" id="play-close">✖ Close</button>
    </div>
    <div class="play-stats">
      <span>Lượt: <span id="play-moves">0</span> / <span id="play-limit">0</span></span>
      <span id="play-stars">★★★</span>
    </div>
    <div class="play-pots-area sb-compact" id="play-pots"></div>
    <div class="play-actions">
      <button id="play-reset">🔄 Reset</button>
      <button id="play-undo">↶ Undo</button>
      <select id="play-flight-mode" style="background:#2a2f3e;color:#FFD700;border:1px solid #4a4f5e;border-radius:6px;padding:6px;font-size:12px;cursor:pointer;">
        <option value="R">🎲 Random</option>
        <option value="B">✈️ B · Arc</option>
        <option value="C">✈️ C · Float</option>
        <option value="D">✈️ D · Crossfade</option>
      </select>
    </div>
  </div>
</div>

<script>
'use strict';

const ASSETS = '../assets/sort_blossom/';
const COLOR_KEYS = SortBlossomEngine.COLORS;
const QUEUE_MAX = 6;
const LS_LEVELS = 'kvtm2_levels_v2';

// ─── STATE ────────────────────────────────────────────
let levels = SortBlossomData.loadLevels();   // array of levels
let currentIdx = 0;                          // which level being edited
let mode = 'add';
let activeColor = 'R';

function level() { return levels[currentIdx]; }

// ─── DOM ──────────────────────────────────────────────
const grid = document.getElementById('pots-grid');
const palette = document.getElementById('palette');
const logEl = document.getElementById('log');
const levelSelect = document.getElementById('level-select');

// ─── RENDER ───────────────────────────────────────────
function render() {
  const lv = level();
  document.getElementById('f-id').value = lv.id;
  document.getElementById('f-name').value = lv.name;
  document.getElementById('f-moves').value = lv.moveLimit;
  document.getElementById('f-star3').value = lv.starThresholds[0];
  document.getElementById('f-star2').value = lv.starThresholds[1];
  document.getElementById('f-star1').value = lv.starThresholds[2];

  renderLevelPicker();
  renderGrid();
  renderPalette();
}

function renderLevelPicker() {
  levelSelect.innerHTML = '';
  levels.forEach((lv, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `#${lv.id} · ${lv.name}`;
    if (i === currentIdx) opt.selected = true;
    levelSelect.appendChild(opt);
  });
}

function renderGrid() {
  grid.innerHTML = '';
  level().pots.forEach((pot, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'pot-cell-wrap';
    wrap.innerHTML = `<span class="pot-index-label">Pot #${idx}</span><button class="delete-btn">×</button>`;
    const cell = SortBlossomRender.buildPotCell({
      idx, pot, assetPath: ASSETS,
      showPosLabel: true, showQueue: true, queueMax: QUEUE_MAX,
    });
    wrap.appendChild(cell);
    grid.appendChild(wrap);

    // Slot clicks → edit active
    cell.querySelectorAll('.sb-active-slot').forEach(slotEl => {
      slotEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const p = parseInt(slotEl.dataset.pos, 10);
        onActiveClick(idx, p);
      });
    });
    // Queue clicks
    cell.querySelectorAll('.sb-queue-flower, .sb-queue-empty').forEach(qEl => {
      qEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const qIdx = parseInt(qEl.dataset.qidx, 10);
        onQueueClick(idx, qIdx);
      });
    });
    // Delete pot
    wrap.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      deletePot(idx);
    });
  });

  // Add-pot button
  const addBtn = document.createElement('div');
  addBtn.className = 'add-pot-btn';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', addPot);
  grid.appendChild(addBtn);
}

function renderPalette() {
  palette.innerHTML = '';
  Object.keys(COLOR_KEYS).forEach(key => {
    const c = SortBlossomRender.COLORS[key];
    const el = document.createElement('div');
    el.className = 'swatch' + (activeColor === key ? ' active' : '');
    el.innerHTML = `<img src="${ASSETS}${c.img}" draggable="false"><div class="lbl">${key}</div>`;
    el.addEventListener('click', () => { activeColor = key; renderPalette(); });
    palette.appendChild(el);
  });
}

// ─── EDITOR ACTIONS ──────────────────────────────────
function onActiveClick(potIdx, pos) {
  const pot = level().pots[potIdx];
  if (mode === 'add') {
    pot.active[pos] = activeColor;
    log(`+ ${activeColor} → pot #${potIdx} [${['L','C','R'][pos]}]`);
  } else {
    if (pot.active[pos]) {
      log(`- removed ${pot.active[pos]} from pot #${potIdx} [${['L','C','R'][pos]}]`);
      pot.active[pos] = null;
    }
  }
  renderGrid();
}

function onQueueClick(potIdx, qIdx) {
  const pot = level().pots[potIdx];
  if (mode === 'add') {
    if (pot.queue.length < QUEUE_MAX) {
      if (qIdx < pot.queue.length) pot.queue[qIdx] = activeColor;
      else pot.queue.push(activeColor);
      log(`+ ${activeColor} → pot #${potIdx} queue[${qIdx}]`);
    }
  } else {
    if (qIdx < pot.queue.length) {
      log(`- removed ${pot.queue[qIdx]}`);
      pot.queue.splice(qIdx, 1);
    }
  }
  renderGrid();
}

function addPot() {
  level().pots.push(SortBlossomEngine.emptyPot());
  log(`+ Added pot #${level().pots.length - 1}`);
  renderGrid();
}

function deletePot(idx) {
  if (level().pots.length <= 2) { log('✗ Need ≥2 pots'); return; }
  level().pots.splice(idx, 1);
  log(`- Deleted pot #${idx}`);
  renderGrid();
}

// ─── LEVEL MANAGEMENT ─────────────────────────────────
function loadLevel(i) {
  currentIdx = Math.max(0, Math.min(levels.length - 1, i));
  render();
  log(`Loaded level ${level().id}: ${level().name}`);
}

function doNew() {
  if (!confirm('Add new level after current?')) return;
  const next = {
    id: Math.max(...levels.map(l => l.id), 0) + 1,
    name: 'New Level',
    pots: [SortBlossomEngine.emptyPot(), SortBlossomEngine.emptyPot()],
    moveLimit: 12,
    starThresholds: [4, 7, 10],
    schemaVersion: 2,
  };
  levels.push(next);
  currentIdx = levels.length - 1;
  render();
  log('+ New level');
}

// ─── SOLVER ────────────────────────────────────────────
function doSolve() {
  syncFromForm();
  log('Solving...');
  const t0 = performance.now();
  setTimeout(() => {
    const r = SortBlossomEngine.bfsSolve(level().pots);
    const ms = Math.round(performance.now() - t0);
    document.getElementById('s-min').textContent = r.solvable ? r.moves : (r.timeout ? 'timeout' : '∞');
    document.getElementById('s-solvable').textContent = r.solvable ? '✓' : '✗';
    document.getElementById('s-states').textContent = r.states.toLocaleString();
    if (r.solvable) {
      const colors = Object.keys(SortBlossomEngine.countColors(level().pots)).length;
      const diff = SortBlossomEngine.difficultyScore(r.moves, level().moveLimit, colors, level().pots.length);
      document.getElementById('s-diff').textContent = diff.toFixed(2);
      document.getElementById('s-meter').style.width = (diff * 100) + '%';
      log(`✓ Min ${r.moves} moves, ${r.states.toLocaleString()} states (${ms}ms), diff ${diff.toFixed(2)}`);
      const sug = [r.moves + 1, r.moves + 3, r.moves + 6];
      document.getElementById('btn-apply-stars').dataset.stars = JSON.stringify(sug);
      document.getElementById('btn-apply-stars').textContent = `Apply ⭐ [${sug.join(', ')}]`;
    } else {
      document.getElementById('s-diff').textContent = '–';
      document.getElementById('s-meter').style.width = '100%';
      log(`✗ Unsolvable (${r.states.toLocaleString()} states, ${ms}ms)`);
    }
  }, 30);
}

function applySuggestedStars() {
  const data = document.getElementById('btn-apply-stars').dataset.stars;
  if (!data) { log('Run Solve first'); return; }
  const sug = JSON.parse(data);
  level().starThresholds = sug;
  level().moveLimit = Math.max(level().moveLimit, sug[2] + 2);
  render();
  log(`Stars set to [${sug.join(', ')}]`);
}

function doValidate() {
  syncFromForm();
  const errs = SortBlossomEngine.validate(level());
  if (errs.length === 0) log('✓ Valid');
  else errs.forEach(e => log('✗ ' + e));
}

// ─── SAVE / EXPORT ────────────────────────────────────
function syncFromForm() {
  const lv = level();
  lv.id = parseInt(document.getElementById('f-id').value, 10) || 1;
  lv.name = document.getElementById('f-name').value || 'Level';
  lv.moveLimit = parseInt(document.getElementById('f-moves').value, 10) || 15;
  lv.starThresholds = [
    parseInt(document.getElementById('f-star3').value, 10) || 5,
    parseInt(document.getElementById('f-star2').value, 10) || 8,
    parseInt(document.getElementById('f-star1').value, 10) || 12,
  ];
}

function doSaveAll() {
  syncFromForm();
  // Download as JS data file
  const js = `// Auto-generated by tools/level_editor.html\n` +
             `// Schema v2 — see docs/sort_blossom_rules.md\n` +
             `(function(g){\n` +
             `  const SORT_BLOSSOM_LEVELS = ${JSON.stringify(levels, null, 2)};\n` +
             `  function loadLevels(){try{const r=localStorage.getItem('kvtm2_levels_v2');if(r){const p=JSON.parse(r);if(Array.isArray(p)&&p.length)return p;}}catch{}return SORT_BLOSSOM_LEVELS;}\n` +
             `  function saveLevels(l){try{localStorage.setItem('kvtm2_levels_v2',JSON.stringify(l));return true;}catch{return false;}}\n` +
             `  function defaultLevels(){return JSON.parse(JSON.stringify(SORT_BLOSSOM_LEVELS));}\n` +
             `  const api={SORT_BLOSSOM_LEVELS,loadLevels,saveLevels,defaultLevels};\n` +
             `  if(typeof module!=='undefined'&&module.exports)module.exports=api;else g.SortBlossomData=api;\n` +
             `})(typeof window!=='undefined'?window:globalThis);\n`;
  const blob = new Blob([js], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sort_blossom_data.js'; a.click();
  URL.revokeObjectURL(url);
  log(`💾 Downloaded sort_blossom_data.js (${levels.length} levels)`);
}

function doCopyCurrent() {
  syncFromForm();
  navigator.clipboard.writeText(JSON.stringify(level(), null, 2));
  log('📋 Copied current level to clipboard');
}

function doPushToGame() {
  syncFromForm();
  const ok = SortBlossomData.saveLevels(levels);
  log(ok ? `⬆ Pushed ${levels.length} levels to localStorage (game reads on reload)` : '✗ localStorage failed');
}

function doLoad() {
  const txt = prompt('Paste level JSON (single level or array):');
  if (!txt) return;
  try {
    const obj = JSON.parse(txt);
    if (Array.isArray(obj)) {
      levels = obj;
      currentIdx = 0;
      log(`📂 Loaded ${obj.length} levels`);
    } else {
      levels[currentIdx] = obj;
      log(`📂 Loaded level into slot #${currentIdx}`);
    }
    render();
  } catch(e) { log('✗ Invalid JSON: ' + e.message); }
}

function log(msg) {
  const t = new Date().toLocaleTimeString();
  logEl.innerHTML = `<div>[${t}] ${msg}</div>` + logEl.innerHTML;
}

// ─── TEST PLAY (uses engine + render in compact mode) ───
let playState = null;
function openPlay() {
  syncFromForm();
  const lv = level();
  playState = {
    pots: SortBlossomEngine.initState(lv.pots),
    moves: 0,
    selected: null,
    history: [],
    moveLimit: lv.moveLimit,
    starThr: lv.starThresholds,
    won: false,
  };
  document.getElementById('play-title').textContent = `▶ ${lv.name} (#${lv.id})`;
  document.getElementById('play-limit').textContent = lv.moveLimit;
  document.getElementById('play-overlay').classList.add('show');
  renderPlay();
}

function closePlay() {
  document.getElementById('play-overlay').classList.remove('show');
}

function renderPlay() {
  const cont = document.getElementById('play-pots');
  cont.innerHTML = '';
  const cells = [];
  cont.onclick = (ev) => {
    if (playState.won) return;
    if (ev.target !== cont) return;
    // Tap on empty board area
    if (playState.selected) {
      // CANCEL rule: tap khoảng không ngoài chậu → hủy chọn
      playState.selected = null;
      renderPlay();
    } else {
      // PHASE 1: chọn bông gần nhất trên board
      const nearest = SortBlossomRender.nearestBoardFlower(ev, cells);
      if (nearest) onPlayTap(nearest.pot, nearest.pos);
    }
  };
  playState.pots.forEach((pot, idx) => {
    const cell = SortBlossomRender.buildPotCell({
      idx, pot, assetPath: ASSETS,
      showPosLabel: false, showQueue: false, queueMax: 6,
    });
    cont.appendChild(cell);
    cells.push(cell);
    cell.querySelector('.sb-pot-visual').addEventListener('click', (ev) => {
      const hitPos = SortBlossomRender.eventToFlowerHitPos(ev, cell);
      const rawPos = playState.selected ? SortBlossomRender.eventToPos(ev, cell) : SortBlossomRender.eventToNearestFlowerPos(ev, cell, pot);
      const p = playState.selected
        ? (hitPos !== null ? hitPos : SortBlossomRender.nearestEmptyPos(pot, rawPos))
        : SortBlossomRender.nearestOccupiedPos(pot, rawPos);
      onPlayTap(idx, p);
    });
  });
  SortBlossomRender.setSelected(cells, playState.selected);
  document.getElementById('play-moves').textContent = playState.moves;
  const stars = SortBlossomEngine.starsFor(playState.moves, playState.starThr);
  document.getElementById('play-stars').textContent = '★'.repeat(stars) + '☆'.repeat(3 - stars);
}

// Phase 2 dispatcher — 4 outcomes: PLACE / RESELECT / CANCEL / IGNORE
function onPlayTap(potIdx, pos) {
  if (playState.won) return;
  const pot = playState.pots[potIdx];
  const sel = playState.selected;

  // ── PHASE 1: chưa cầm bông ─────────────────────────
  if (!sel) {
    // IGNORE: pot không có bông active để chọn
    if (pot.active.every(x => x === null)) return;
    // Tap đúng bông → chọn. Tap slot rỗng → resolve nearest occupied
    const targetPos = pot.active[pos] ? pos : SortBlossomRender.nearestOccupiedPos(pot, pos);
    if (!pot.active[targetPos]) return;
    playState.selected = { pot: potIdx, pos: targetPos };
    renderPlay();
    return;
  }

  // ── PHASE 2: đang cầm bông ─────────────────────────

  // CANCEL: tap chính bông đang cầm
  if (sel.pot === potIdx && sel.pos === pos) {
    playState.selected = null;
    renderPlay();
    return;
  }

  // SAME POT (khác slot) → RESELECT (no move)
  if (sel.pot === potIdx) {
    // Tap bông khác cùng pot → reselect held sang bông đó
    if (pot.active[pos]) {
      playState.selected = { pot: potIdx, pos };
      renderPlay();
      return;
    }
    // Tap slot rỗng trong same pot → ignored (no place vào pot nguồn)
    return;
  }

  // ── DIFFERENT POT ──────────────────────────────────
  const destHasEmpty = pot.active.some(x => x === null);

  if (!destHasEmpty) {
    // FULL active → RESELECT (held = bông vừa tap)
    const targetPos = pot.active[pos] ? pos : SortBlossomRender.nearestOccupiedPos(pot, pos);
    if (pot.active[targetPos]) {
      playState.selected = { pot: potIdx, pos: targetPos };
      renderPlay();
    }
    return;
  }

  // Pot đích có slot trống → PLACE (with arc flight animation)
  const placePos = pot.active[pos] === null ? pos : SortBlossomRender.nearestEmptyPos(pot, pos);
  if (pot.active[placePos] !== null) return;

  if (!SortBlossomEngine.canMove(playState.pots, sel.pot, sel.pos, potIdx, placePos)) {
    renderPlay();
    return;
  }

  // Capture cells refs before clearing selection
  const cont = document.getElementById('play-pots');
  const cells = [...cont.querySelectorAll('.sb-pot-cell')];
  const srcSel = sel;
  const flyColor = playState.pots[srcSel.pot].active[srcSel.pos];
  playState.selected = null;
  SortBlossomRender.setSelected(cells, null);

  SortBlossomRender.animateFlight({
    srcCell: cells[srcSel.pot],
    destCell: cells[potIdx],
    srcPos: srcSel.pos,
    destPos: placePos,
    color: flyColor,
    assetPath: ASSETS,
    onLand: () => {
      // Step 1: PLACE only — show flower seated, NO vanish yet
      playState.history.push(SortBlossomEngine.clone(playState.pots));
      const r = SortBlossomEngine.applyMovePlace(playState.pots, srcSel.pot, srcSel.pos, potIdx, placePos);
      playState.moves++;
      // Promote any pot whose active row went empty (source pot typically)
      playState.pots.forEach(p => SortBlossomEngine.promote(p));
      renderPlay();   // user thấy bông cắm + queue auto-shift nếu source rỗng
      // Step 2: nếu match → đợi 220ms cho mắt thấy, RỒI vanish
      if (r.willVanish) {
        const destCellEl = document.querySelectorAll('#play-pots .sb-pot-cell')[potIdx];
        setTimeout(() => {
          SortBlossomRender.playVanish(destCellEl, () => {
            SortBlossomEngine.settle(playState.pots);
            renderPlay();
          });
        }, 220);
      }
    },
    onDone: () => {
      const delay = (SortBlossomEngine.isWon(playState.pots) || playState.moves >= playState.moveLimit) ? 500 : 0;
      setTimeout(() => {
        if (SortBlossomEngine.isWon(playState.pots)) {
          playState.won = true;
          renderPlay();
          setTimeout(() => alert(`🌸 Cleared in ${playState.moves} moves!`), 100);
          return;
        }
        if (playState.moves >= playState.moveLimit) {
          renderPlay();
          setTimeout(() => alert(`💔 Out of moves at ${playState.moves}.`), 100);
        }
      }, delay);
    }
  });
}

function playUndo() {
  if (!playState.history.length) return;
  playState.pots = playState.history.pop();
  playState.moves = Math.max(0, playState.moves - 1);
  playState.won = false;
  playState.selected = null;
  renderPlay();
}

function playReset() {
  playState.pots = SortBlossomEngine.initState(level().pots);
  playState.moves = 0;
  playState.selected = null;
  playState.history = [];
  playState.won = false;
  renderPlay();
}

// ─── WIRE ─────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', doNew);
document.getElementById('btn-load').addEventListener('click', doLoad);
document.getElementById('btn-save').addEventListener('click', doSaveAll);
document.getElementById('btn-export-clip').addEventListener('click', doCopyCurrent);
document.getElementById('btn-push').addEventListener('click', doPushToGame);
document.getElementById('btn-solve').addEventListener('click', doSolve);
document.getElementById('btn-validate').addEventListener('click', doValidate);
document.getElementById('btn-play').addEventListener('click', openPlay);
document.getElementById('btn-apply-stars').addEventListener('click', applySuggestedStars);
document.getElementById('btn-prev').addEventListener('click', () => loadLevel(currentIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => loadLevel(currentIdx + 1));
levelSelect.addEventListener('change', () => loadLevel(parseInt(levelSelect.value, 10)));

document.getElementById('mode-add').addEventListener('click', () => {
  mode = 'add';
  document.getElementById('mode-add').classList.add('active');
  document.getElementById('mode-remove').classList.remove('active');
});
document.getElementById('mode-remove').addEventListener('click', () => {
  mode = 'remove';
  document.getElementById('mode-remove').classList.add('active');
  document.getElementById('mode-add').classList.remove('active');
});

['f-id','f-name','f-moves','f-star3','f-star2','f-star1'].forEach(id => {
  document.getElementById(id).addEventListener('input', syncFromForm);
});

document.getElementById('play-close').addEventListener('click', closePlay);
document.getElementById('play-undo').addEventListener('click', playUndo);
document.getElementById('play-reset').addEventListener('click', playReset);

// Flight mode selector (sync with game's localStorage key)
const flightSel = document.getElementById('play-flight-mode');
if (flightSel) {
  try { flightSel.value = localStorage.getItem('kvtm_flight_mode') || 'R'; } catch(e) {}
  window._flightMode = flightSel.value;
  flightSel.addEventListener('change', () => {
    window._flightMode = flightSel.value;
    try { localStorage.setItem('kvtm_flight_mode', flightSel.value); } catch(e) {}
  });
}

log(`Editor v2 ready · ${levels.length} levels loaded · engine v${SortBlossomEngine.VERSION}`);
render();
</script>
