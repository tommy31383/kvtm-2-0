<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bloom Anim Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#111318;--bg2:#1a1d24;--bg3:#22262f;--border:#2e3340;
  --gold:#FFD700;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --text:#d4d8e2;--muted:#6b7280;--accent:#7c6fcd;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:12px;}

/* TOP BAR */
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
#topbar .logo{font-size:13px;color:var(--gold);font-weight:700;margin-right:4px;}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
select,input[type=number]{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:11px;height:26px;}
.btn{display:inline-flex;align-items:center;gap:3px;padding:0 9px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:11px;white-space:nowrap;}
.btn:hover{background:#2e3340;border-color:#4a5168;}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:#2a2000;}
.btn.green{border-color:var(--green);color:var(--green);}.btn.green:hover{background:#0a1f0a;}
.btn.blue{border-color:var(--blue);color:var(--blue);}.btn.blue:hover{background:#0a1428;}
.btn.red{border-color:var(--red);color:var(--red);}.btn.red:hover{background:#1f0a0a;}
.btn.sm{height:22px;padding:0 6px;font-size:10px;}
#tbStatus{font-size:10px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tbStatus.ok{color:var(--green);}#tbStatus.err{color:var(--red);}#tbStatus.warn{color:#fb923c;}

/* WORKSPACE */
#workspace{flex:1;display:flex;min-height:0;}

/* LEFT */
#left{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sec{padding:8px 10px;border-bottom:1px solid var(--border);}
.sec h4{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:7px;}
.pr{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.pr label{font-size:10px;color:var(--muted);width:26px;flex-shrink:0;}
.pr input[type=number]{flex:1;height:22px;font-size:11px;}
.pr span{font-size:10px;color:var(--muted);}
.rr{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.rr label{font-size:10px;color:var(--muted);width:38px;flex-shrink:0;}
.rr input[type=range]{flex:1;}
.rr span{font-size:10px;color:var(--muted);width:22px;text-align:right;}
.lb{width:100%;height:23px;margin-bottom:3px;font-size:11px;}
#selInfo{font-size:10px;color:var(--muted);line-height:1.7;margin-bottom:6px;}

/* CENTER */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#canvasWrap{flex:1;overflow:auto;background:#070809;position:relative;}
#sheetCanvas{display:block;cursor:crosshair;}

/* RIGHT */
#right{width:150px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;}
.rsec{padding:8px 10px;border-bottom:1px solid var(--border);}
.rsec h4{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:7px;}
#prevCv{display:block;border:1px solid var(--border);border-radius:3px;background:#070809;width:130px;height:130px;}
#prevLabel{text-align:center;font-size:10px;color:var(--gold);margin-top:4px;}
.playbar{display:flex;gap:3px;padding:6px 8px;border-bottom:1px solid var(--border);}
.playbar .btn{flex:1;justify-content:center;padding:0;}
#fpsRow{padding:6px 10px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--border);}
#fpsRow label{font-size:10px;color:var(--muted);}
#fpsRow input{flex:1;}
#fpsRow span{font-size:10px;color:var(--gold);width:28px;text-align:right;}
#sheetInfo{padding:8px 10px;font-size:10px;color:var(--muted);line-height:1.8;}

/* TIMELINE */
#tl{height:108px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-direction:column;}
#tlBar{display:flex;align-items:center;gap:5px;padding:3px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#tlBar h4{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
#tlScroll{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;align-items:center;padding:5px 8px;gap:4px;}
.tf{flex-shrink:0;width:62px;border:1.5px solid var(--border);border-radius:5px;background:var(--bg3);cursor:pointer;display:flex;flex-direction:column;position:relative;transition:border-color .1s;}
.tf:hover{border-color:#4a5068;}
.tf.sel{border-color:var(--gold);}
.tf.playing{border-color:var(--green);}
.tf canvas{display:block;width:100%;height:50px;border-radius:3px 3px 0 0;background:#070809;}
.tf .tbot{display:flex;align-items:center;justify-content:space-between;padding:2px 4px;}
.tf .tidx{font-size:9px;color:var(--muted);}
.tf .tdur{font-size:9px;color:var(--gold);border:none;background:transparent;width:34px;text-align:right;cursor:text;padding:0;color:var(--gold);}
.tf .tdur:focus{outline:none;color:#fff;}
.tf .tdel{position:absolute;top:1px;right:1px;width:13px;height:13px;background:rgba(180,40,40,.9);border-radius:2px;display:none;align-items:center;justify-content:center;font-size:8px;cursor:pointer;color:#fff;}
.tf:hover .tdel{display:flex;}
.tl-add{flex-shrink:0;width:50px;height:80px;border:1.5px dashed #2e3340;border-radius:5px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:22px;color:#3a4050;cursor:pointer;}
.tl-add:hover{border-color:var(--green);color:var(--green);}
#tlInfo{margin-left:auto;font-size:10px;color:var(--muted);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">🌸 Bloom Editor</span>
  <div class="sep"></div>

  <select id="colorPicker" style="width:106px;" onchange="onColorChange()">
    <option value="red">Red (R)</option>
    <option value="pink">Pink (P)</option>
    <option value="yellow">Yellow (Y)</option>
    <option value="purple">Purple (V)</option>
    <option value="white">White (W)</option>
    <option value="orange">Orange (O)</option>
    <option value="blue">Blue (B)</option>
    <option value="camellia">Camellia (C)</option>
  </select>
  <button class="btn" onclick="loadSheet()">↺ Sheet (auto)</button>
  <button class="btn blue" onclick="loadSheetFile()">🖼 Sheet file</button>
  <input type="file" id="sheetFileIn" accept=".webp,.png,.jpg" style="display:none" onchange="onSheetFile(this)">
  <div class="sep"></div>

  <!-- LOAD -->
  <button class="btn blue" onclick="loadJSONFile()">📂 Load JSON</button>
  <button class="btn blue" onclick="loadFromServer()">🌐 Load server</button>
  <input type="file" id="jsonFileIn" accept=".json" style="display:none" onchange="onJSONFile(this)">
  <div class="sep"></div>

  <!-- SAVE -->
  <button class="btn gold" onclick="saveToServer()">💾 Save server</button>
  <button class="btn green" onclick="downloadJSON()">⬇ JSON</button>
  <div class="sep"></div>

  <label style="font-size:10px;color:var(--muted);">Zoom</label>
  <input type="number" id="zoomIn" value="50" min="10" max="300" step="5" style="width:54px;" onchange="onZoomChange()">
  <span style="font-size:10px;color:var(--muted);">%</span>
  <div id="tbStatus" class="">Chọn màu → Load Sheet</div>
</div>

<!-- WORKSPACE -->
<div id="workspace">

<!-- LEFT PANEL -->
<div id="left">
  <div class="sec">
    <h4>Frame đang chọn</h4>
    <div id="selInfo">—</div>
    <div class="pr"><label>X</label><input type="number" id="fxIn" oninput="applyProp('x')"></div>
    <div class="pr"><label>Y</label><input type="number" id="fyIn" oninput="applyProp('y')"></div>
    <div class="pr"><label>W</label><input type="number" id="fwIn" oninput="applyProp('w')"></div>
    <div class="pr"><label>H</label><input type="number" id="fhIn" oninput="applyProp('h')"></div>
    <div class="pr"><label>ms</label><input type="number" id="fdurIn" min="10" max="2000" step="10" oninput="applyDur()"><span>dur</span></div>
  </div>

  <div class="sec">
    <h4>Frames</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:4px;">
      <button class="btn green lb" onclick="addFrame()">+ Add</button>
      <button class="btn lb" onclick="dupFrame()">⧉ Dup</button>
      <button class="btn red lb" onclick="delFrame()">✕ Del</button>
      <button class="btn lb" onclick="clearAll()" title="Xóa tất cả frames">🗑 Clear</button>
      <button class="btn lb" onclick="moveFrame(-1)">◀ Move</button>
      <button class="btn lb" onclick="moveFrame(1)">Move ▶</button>
    </div>
    <button class="btn lb" style="width:100%;margin-top:2px;" onclick="initDefaultFrames()">↺ Reset 5×2 grid</button>
  </div>

  <div class="sec">
    <h4>Best Fit</h4>
    <div class="rr"><label>Alpha</label><input type="range" id="alphaIn" min="1" max="128" value="8" oninput="document.getElementById('aVal').textContent=this.value"><span id="aVal">8</span></div>
    <div class="rr"><label>Pad</label><input type="range" id="padIn" min="0" max="40" value="4" oninput="document.getElementById('pVal').textContent=this.value"><span id="pVal">4</span></div>
    <button class="btn green lb" onclick="bestFit()">✨ Fit frame này</button>
    <button class="btn lb" onclick="bestFitAll()">✨ Fit ALL</button>
    <button class="btn lb" onclick="bestFitUniform()">✨ Fit ALL uniform</button>
    <button class="btn lb" onclick="applyWHtoAll()">↕ Apply W×H to all</button>
    <div id="bfMsg" style="font-size:10px;color:var(--muted);margin-top:3px;"></div>
  </div>

  <div class="sec">
    <h4>Onion Skin</h4>
    <button class="btn lb" id="onionBtn" onclick="toggleOnion()">⊙ OFF</button>
    <div class="rr" style="margin-top:5px;"><label>Alpha</label><input type="range" id="onionA" min="5" max="70" value="25" oninput="render()"><span id="onionAV" style="font-size:10px;color:var(--muted);">25</span></div>
  </div>
</div>

<!-- CENTER CANVAS -->
<div id="center">
  <div id="canvasWrap"><canvas id="sheetCanvas"></canvas></div>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <div class="rsec">
    <h4>Preview</h4>
    <canvas id="prevCv" width="130" height="130"></canvas>
    <div id="prevLabel">—</div>
  </div>
  <div class="playbar">
    <button class="btn" onclick="stepAnim(-1)">⏮</button>
    <button class="btn" id="playBtn" onclick="togglePlay()" style="flex:2;">▶</button>
    <button class="btn" onclick="stepAnim(1)">⏭</button>
  </div>
  <div id="fpsRow">
    <label>ms</label>
    <input type="range" id="fpsIn" min="20" max="500" value="90" oninput="document.getElementById('fpsV').textContent=this.value">
    <span id="fpsV">90</span>
  </div>
  <div id="sheetInfo">—</div>
</div>

</div><!-- workspace -->

<!-- TIMELINE -->
<div id="tl">
  <div id="tlBar">
    <h4>Timeline</h4>
    <button class="btn sm green" onclick="addFrame()">+ Add</button>
    <button class="btn sm" onclick="dupFrame()">⧉</button>
    <button class="btn sm red" onclick="delFrame()">✕</button>
    <button class="btn sm" onclick="moveFrame(-1)">◀</button>
    <button class="btn sm" onclick="moveFrame(1)">▶</button>
    <span id="tlInfo"></span>
  </div>
  <div id="tlScroll"></div>
</div>

<script>
const BASE = '../assets/sort_blossom/flower_';
const COLOR_KEY = {red:'R',pink:'P',yellow:'Y',purple:'V',white:'W',orange:'O',blue:'B',camellia:'C'};

let img    = new Image();
let zoom   = 0.5;
let frames = []; // [{x,y,w,h,dur}]
let selIdx = -1;
let playing = false, animTimer = null, animCursor = 0;
let onion = false;
let drag = null;

const cv   = document.getElementById('sheetCanvas');
const ctx  = cv.getContext('2d');
const pcv  = document.getElementById('prevCv');
const pctx = pcv.getContext('2d');

// ── LOAD SHEET ───────────────────────────────────────────────
function loadSheet() {
  const color = document.getElementById('colorPicker').value;
  zoom = (parseInt(document.getElementById('zoomIn').value)||50)/100;
  const tmp = new Image();
  tmp.onerror = ()=> st('❌ Không load sheet','err');
  tmp.onload  = ()=>{
    img = tmp;
    st(`✅ ${img.naturalWidth}×${img.naturalHeight}`,'ok');
    document.getElementById('sheetInfo').innerHTML = `${img.naturalWidth}×${img.naturalHeight}<br>${frames.length} frames`;
    if (!frames.length) initDefaultFrames();
    render(); buildTL(); drawPrev(Math.max(0,selIdx));
  };
  tmp.src = BASE + color + '_bloom.webp?v='+Date.now();
}

// Load sheet from local file → data URL → no canvas taint → getImageData works
function loadSheetFile() { document.getElementById('sheetFileIn').click(); }
function onSheetFile(inp) {
  const file = inp.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const tmp = new Image();
    tmp.onerror = () => st('❌ Không load sheet file','err');
    tmp.onload = () => {
      img = tmp;
      st(`✅ ${img.naturalWidth}×${img.naturalHeight} (data URL — Best Fit hoạt động)`,'ok');
      document.getElementById('sheetInfo').innerHTML = `${img.naturalWidth}×${img.naturalHeight}<br>${frames.length} frames`;
      if (!frames.length) initDefaultFrames();
      render(); buildTL(); drawPrev(Math.max(0,selIdx));
    };
    tmp.src = e.target.result; // data URL = same-origin, không tainted
  };
  reader.readAsDataURL(file);
  inp.value = '';
}

function initDefaultFrames() {
  if (!img.naturalWidth) return;
  const cols=5,rows=2,fw=img.naturalWidth/cols,fh=img.naturalHeight/rows;
  frames=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) frames.push({x:c*fw,y:r*fh,w:fw,h:fh,dur:90});
  selIdx=0; updateProps(); buildTL(); render(); drawPrev(0);
}

// ── LOAD JSON (file picker — no server) ─────────────────────
function loadJSONFile() { document.getElementById('jsonFileIn').click(); }
function onJSONFile(inp) {
  const file = inp.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const rects = data.rects || data;
      if (!Array.isArray(rects)) throw new Error('rects không phải array');
      const durs = data.durations || [];
      frames = rects.map(([x,y,w,h],i)=>({x,y,w,h,dur:durs[i]||90}));
      selIdx = 0; updateProps(); buildTL(); render(); drawPrev(0);
      st(`✅ Loaded ${frames.length} frames từ ${file.name}`,'ok');
      document.getElementById('sheetInfo').innerHTML = `${img.naturalWidth}×${img.naturalHeight}<br>${frames.length} frames`;
    } catch(err){ st('❌ '+err.message,'err'); }
  };
  r.readAsText(file);
  inp.value='';
}

// ── LOAD FROM SERVER ─────────────────────────────────────────
async function loadFromServer() {
  st('⏳ Loading...','warn');
  try {
    const res  = await fetch('/api/bloom-rects');
    const text = await res.text();
    let data; try{data=JSON.parse(text);}catch(e){throw new Error('Server: '+text.slice(0,80));}
    if (!data.ok) throw new Error(data.error);
    const key = COLOR_KEY[document.getElementById('colorPicker').value];
    const rects = data.rects[key];
    if (!rects||!rects.length) throw new Error('No rects for '+key);
    frames = rects.map(([x,y,w,h])=>({x,y,w,h,dur:90}));
    selIdx=0; updateProps(); buildTL(); render(); drawPrev(0);
    st(`✅ ${frames.length} frames [${key}]`,'ok');
    document.getElementById('sheetInfo').innerHTML = `${img.naturalWidth}×${img.naturalHeight}<br>${frames.length} frames`;
  } catch(e){ st('❌ '+e.message,'err'); }
}

// ── RENDER SHEET ─────────────────────────────────────────────
function render() {
  if (!img.naturalWidth) return;
  cv.width  = Math.round(img.naturalWidth  * zoom);
  cv.height = Math.round(img.naturalHeight * zoom);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(img,0,0,cv.width,cv.height);

  // Onion skin
  if (onion && selIdx>=0) {
    const oa = parseInt(document.getElementById('onionA').value)/100;
    document.getElementById('onionAV').textContent = document.getElementById('onionA').value;
    const drawO=(fi,col)=>{ if(fi<0||fi>=frames.length||fi===selIdx)return; const f=frames[fi]; ctx.globalAlpha=oa; ctx.fillStyle=col; ctx.fillRect(f.x*zoom,f.y*zoom,f.w*zoom,f.h*zoom); ctx.globalAlpha=1; ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.strokeRect(f.x*zoom+.5,f.y*zoom+.5,f.w*zoom-1,f.h*zoom-1); };
    drawO(selIdx-1,'#60a5fa');
    drawO(selIdx+1,'#fb923c');
  }

  frames.forEach((f,i)=>{
    const x=f.x*zoom,y=f.y*zoom,w=f.w*zoom,h=f.h*zoom,sel=(i===selIdx);
    ctx.strokeStyle=sel?'#FFD700':'rgba(255,255,255,0.22)';
    ctx.lineWidth=sel?2:1;
    ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    if(sel){ctx.fillStyle='rgba(255,215,0,0.07)';ctx.fillRect(x,y,w,h);}
    ctx.fillStyle=sel?'#FFD700':'rgba(255,255,255,0.5)';
    ctx.font=`${Math.max(9,Math.round(11*zoom))}px monospace`;
    ctx.fillText('F'+i,x+3,y+Math.max(10,12*zoom));
    if(sel) [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([hx,hy])=>{ctx.fillStyle='#FFD700';ctx.fillRect(hx-5,hy-5,10,10);});
  });
}

// ── PREVIEW ──────────────────────────────────────────────────
function drawPrev(fi) {
  if (!img.naturalWidth||!frames[fi]) return;
  const f=frames[fi];
  pcv.width=130; pcv.height=130;
  // Checkerboard
  for(let r=0;r<7;r++)for(let c=0;c<7;c++){pctx.fillStyle=(r+c)%2?'#1a1d24':'#22262f';pctx.fillRect(c*19,r*19,19,19);}
  const sc=Math.min(130/f.w,130/f.h);
  const dw=f.w*sc,dh=f.h*sc;
  pctx.drawImage(img,f.x,f.y,f.w,f.h,(130-dw)/2,(130-dh)/2,dw,dh);
  document.getElementById('prevLabel').textContent=`F${fi}/${frames.length-1}  ${f.dur||90}ms`;
}

// ── TIMELINE ─────────────────────────────────────────────────
function buildTL() {
  const tl = document.getElementById('tlScroll');
  tl.innerHTML = '';
  frames.forEach((f,i)=>{
    const w = document.createElement('div');
    w.className = 'tf'+(i===selIdx?' sel':'');
    w.dataset.i = i;
    w.draggable = true;

    const tc = document.createElement('canvas');
    tc.width=62; tc.height=50;
    if(img.naturalWidth) tc.getContext('2d').drawImage(img,f.x,f.y,f.w,f.h,0,0,62,50);
    w.appendChild(tc);

    const bot = document.createElement('div'); bot.className='tbot';
    const idx = document.createElement('span'); idx.className='tidx'; idx.textContent='F'+i;
    const dur = document.createElement('input'); dur.className='tdur'; dur.type='number'; dur.min=10; dur.max=2000; dur.step=10; dur.value=f.dur||90; dur.title='ms';
    dur.onclick=e=>e.stopPropagation();
    dur.oninput=e=>{ frames[i].dur=parseInt(e.target.value)||90; if(selIdx===i){document.getElementById('fdurIn').value=frames[i].dur;} updateTLInfo(); };
    bot.appendChild(idx); bot.appendChild(dur); w.appendChild(bot);

    const del=document.createElement('div'); del.className='tdel'; del.textContent='✕';
    del.onclick=e=>{ e.stopPropagation(); delFrameAt(i); }; w.appendChild(del);

    w.onclick=()=>selectFrame(i);
    w.addEventListener('dragstart',e=>{ w._di=i; w.style.opacity='.45'; e.dataTransfer.effectAllowed='move'; });
    w.addEventListener('dragend',  ()=>{ w.style.opacity=''; });
    w.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    w.addEventListener('drop',     e=>{ e.preventDefault(); const from=parseInt(document.querySelector('.tf[style*="opacity"]')?.dataset.i??'-1'); if(from<0||from===i)return; const f2=frames.splice(from,1)[0]; frames.splice(i,0,f2); selIdx=i; buildTL(); render(); updateProps(); });

    tl.appendChild(w);
  });

  // + Add button
  const add=document.createElement('div'); add.className='tl-add'; add.textContent='+'; add.title='Add frame'; add.onclick=addFrame;
  tl.appendChild(add);
  updateTLInfo();
}

function updateTLInfo() {
  const total = frames.reduce((s,f)=>s+(f.dur||90),0);
  document.getElementById('tlInfo').textContent = `${frames.length} frames · ${total}ms total`;
}

function refreshThumb(i) {
  const w = document.getElementById('tlScroll').children[i];
  if(!w||!img.naturalWidth) return;
  const tc = w.querySelector('canvas');
  if(!tc) return;
  const f=frames[i];
  tc.getContext('2d').clearRect(0,0,62,50);
  tc.getContext('2d').drawImage(img,f.x,f.y,f.w,f.h,0,0,62,50);
}

// ── SELECTION ────────────────────────────────────────────────
function selectFrame(i) {
  selIdx=i;
  document.querySelectorAll('.tf').forEach((w,j)=>w.classList.toggle('sel',j===i));
  updateProps(); render(); stopPlay(); animCursor=i; drawPrev(i);
}

function updateProps() {
  if(selIdx<0||selIdx>=frames.length){document.getElementById('selInfo').textContent='—';return;}
  const f=frames[selIdx];
  document.getElementById('selInfo').textContent=`F${selIdx}  (${Math.round(f.x)},${Math.round(f.y)})  ${Math.round(f.w)}×${Math.round(f.h)}`;
  document.getElementById('fxIn').value=Math.round(f.x);
  document.getElementById('fyIn').value=Math.round(f.y);
  document.getElementById('fwIn').value=Math.round(f.w);
  document.getElementById('fhIn').value=Math.round(f.h);
  document.getElementById('fdurIn').value=f.dur||90;
}

function applyProp(k) {
  if(selIdx<0) return;
  frames[selIdx][k]=parseFloat(document.getElementById('f'+k+'In').value)||0;
  refreshThumb(selIdx); render(); updateProps(); drawPrev(selIdx);
}
function applyDur() {
  if(selIdx<0) return;
  frames[selIdx].dur=parseInt(document.getElementById('fdurIn').value)||90;
  const tl=document.getElementById('tlScroll');
  const inp=tl.children[selIdx]?.querySelector('.tdur');
  if(inp) inp.value=frames[selIdx].dur;
  updateTLInfo();
}

// ── FRAME MANAGEMENT ─────────────────────────────────────────
function addFrame() {
  const last=frames[frames.length-1]||{x:0,y:0,w:img.naturalWidth/5||100,h:img.naturalHeight/2||100,dur:90};
  frames.push({...last});
  selIdx=frames.length-1;
  buildTL(); render(); updateProps(); drawPrev(selIdx);
}
function dupFrame() {
  if(selIdx<0) return;
  frames.splice(selIdx+1,0,{...frames[selIdx]});
  selIdx++;
  buildTL(); render(); updateProps(); drawPrev(selIdx);
}
function delFrameAt(i) {
  if(frames.length<=1){st('❌ Cần ít nhất 1 frame','err');return;}
  frames.splice(i,1);
  if(selIdx>=frames.length) selIdx=frames.length-1;
  buildTL(); render(); updateProps();
}
function delFrame(){ delFrameAt(selIdx); }
function clearAll() {
  if(!confirm('Xóa tất cả frames?')) return;
  frames=[]; selIdx=-1; buildTL(); render(); updateProps();
}
function moveFrame(d) {
  if(selIdx<0) return;
  const ni=selIdx+d;
  if(ni<0||ni>=frames.length) return;
  [frames[selIdx],frames[ni]]=[frames[ni],frames[selIdx]];
  selIdx=ni; buildTL(); render(); updateProps();
}

// ── PLAY ─────────────────────────────────────────────────────
function togglePlay(){ playing?stopPlay():startPlay(); }
function startPlay() {
  stopPlay(); playing=true;
  document.getElementById('playBtn').textContent='⏸';
  if(!frames.length) return;
  function tick() {
    if(!playing) return;
    document.querySelectorAll('.tf').forEach((w,j)=>w.classList.toggle('playing',j===animCursor));
    drawPrev(animCursor);
    const dur=frames[animCursor]?.dur||parseInt(document.getElementById('fpsIn').value)||90;
    animCursor=(animCursor+1)%frames.length;
    animTimer=setTimeout(tick,dur);
  }
  tick();
}
function stopPlay() {
  playing=false; if(animTimer){clearTimeout(animTimer);animTimer=null;}
  document.getElementById('playBtn').textContent='▶';
  document.querySelectorAll('.tf.playing').forEach(w=>w.classList.remove('playing'));
}
function stepAnim(d) {
  stopPlay(); animCursor=((animCursor+d)+frames.length)%frames.length;
  selectFrame(animCursor);
}

// ── ONION ────────────────────────────────────────────────────
function toggleOnion() {
  onion=!onion;
  const b=document.getElementById('onionBtn');
  b.textContent=onion?'⊙ ON':'⊙ OFF';
  b.style.color=onion?'#fb923c':''; b.style.borderColor=onion?'#fb923c':'';
  render();
}

// ── BEST FIT (cần localhost vì getImageData) ──────────────────
function getPixels(i) {
  const f=frames[i],oc=document.createElement('canvas');
  oc.width=Math.ceil(f.w); oc.height=Math.ceil(f.h);
  const c2=oc.getContext('2d'); c2.drawImage(img,f.x,f.y,f.w,f.h,0,0,oc.width,oc.height);
  return{px:c2.getImageData(0,0,oc.width,oc.height).data,W:oc.width,H:oc.height};
}
function computeBF(i) {
  const ALPHA=parseInt(document.getElementById('alphaIn').value)||8;
  const PAD  =parseInt(document.getElementById('padIn').value)||4;
  const f=frames[i]; const{px,W,H}=getPixels(i);
  const has=(x0,y0,x1,y1)=>{for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)if(px[(y*W+x)*4+3]>ALPHA)return true;return false;};
  let x0=0,x1=W-1,y0=0,y1=H-1;
  for(let y=0;y<H;y++) if(has(0,y,W-1,y)){y0=y;break;}
  for(let y=H-1;y>=0;y--)if(has(0,y,W-1,y)){y1=y;break;}
  for(let x=0;x<W;x++) if(has(x,y0,x,y1)){x0=x;break;}
  for(let x=W-1;x>=0;x--)if(has(x,y0,x,y1)){x1=x;break;}
  if(x0>=x1||y0>=y1) return null;
  return{x:f.x+Math.max(0,x0-PAD),y:f.y+Math.max(0,y0-PAD),w:Math.min(W-1,x1+PAD)-Math.max(0,x0-PAD)+1,h:Math.min(H-1,y1+PAD)-Math.max(0,y0-PAD)+1};
}
function bestFit() {
  if(selIdx<0)return;
  try{const r=computeBF(selIdx);if(!r){document.getElementById('bfMsg').textContent='❌ No content';return;}Object.assign(frames[selIdx],r);refreshThumb(selIdx);render();updateProps();drawPrev(selIdx);document.getElementById('bfMsg').textContent=`✅ F${selIdx}: ${Math.round(r.w)}×${Math.round(r.h)}`;}catch(e){document.getElementById('bfMsg').textContent='❌ '+e.message;}
}
function bestFitAll() {
  let ok=0;frames.forEach((_,i)=>{try{const r=computeBF(i);if(r){Object.assign(frames[i],r);refreshThumb(i);ok++;}}catch(e){}});
  render();updateProps();document.getElementById('bfMsg').textContent=`✅ ${ok}/${frames.length}`;
}
function bestFitUniform() {
  const fits=frames.map((_,i)=>{try{return computeBF(i);}catch(e){return null;}});
  const v=fits.filter(Boolean);if(!v.length){document.getElementById('bfMsg').textContent='❌ None';return;}
  const mw=Math.max(...v.map(f=>f.w)),mh=Math.max(...v.map(f=>f.h));
  fits.forEach((r,i)=>{if(!r)return;const cx=r.x+r.w/2,cy=r.y+r.h/2;frames[i].x=Math.max(0,cx-mw/2);frames[i].y=Math.max(0,cy-mh/2);frames[i].w=mw;frames[i].h=mh;refreshThumb(i);});
  render();updateProps();document.getElementById('bfMsg').textContent=`✅ Uniform ${Math.round(mw)}×${Math.round(mh)}`;
}
function applyWHtoAll() {
  if(selIdx<0)return;
  const f=frames[selIdx];
  frames.forEach((fr,i)=>{fr.w=f.w;fr.h=f.h;refreshThumb(i);});render();
}

// ── DRAG ON CANVAS ────────────────────────────────────────────
const HS=8;
function hitTest(mx,my) {
  if(selIdx>=0){
    const f=frames[selIdx],x=f.x*zoom,y=f.y*zoom,w=f.w*zoom,h=f.h*zoom;
    const corners=[{cx:x,cy:y,dx:-1,dy:-1},{cx:x+w,cy:y,dx:1,dy:-1},{cx:x,cy:y+h,dx:-1,dy:1},{cx:x+w,cy:y+h,dx:1,dy:1}];
    for(const c of corners) if(Math.abs(mx-c.cx)<HS&&Math.abs(my-c.cy)<HS)return{type:'resize',fi:selIdx,...c};
  }
  for(let i=frames.length-1;i>=0;i--){
    const f=frames[i];
    if(mx>=f.x*zoom&&mx<=(f.x+f.w)*zoom&&my>=f.y*zoom&&my<=(f.y+f.h)*zoom)return{type:'move',fi:i};
  }
  return null;
}
cv.addEventListener('mousedown',e=>{
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const h=hitTest(mx,my);
  if(!h){selectFrame(-1);render();return;}
  selectFrame(h.fi);
  const f=frames[h.fi];
  drag={...h,smx:mx,smy:my,sfx:f.x,sfy:f.y,sfw:f.w,sfh:f.h};
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!img.naturalWidth)return;
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  cv.style.cursor=hitTest(mx,my)?(hitTest(mx,my).type==='resize'?'nwse-resize':'move'):'crosshair';
  if(!drag)return;
  const dx=(mx-drag.smx)/zoom,dy=(my-drag.smy)/zoom;
  const f=frames[drag.fi];
  if(drag.type==='move'){f.x=drag.sfx+dx;f.y=drag.sfy+dy;}
  else{
    if(drag.dx<0){f.x=drag.sfx+dx;f.w=Math.max(10,drag.sfw-dx);}else{f.w=Math.max(10,drag.sfw+dx);}
    if(drag.dy<0){f.y=drag.sfy+dy;f.h=Math.max(10,drag.sfh-dy);}else{f.h=Math.max(10,drag.sfh+dy);}
  }
  refreshThumb(drag.fi);render();updateProps();drawPrev(drag.fi);
});
window.addEventListener('mouseup',()=>{drag=null;});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom=Math.max(0.1,Math.min(4,zoom+(e.deltaY<0?0.05:-0.05)));
  document.getElementById('zoomIn').value=Math.round(zoom*100);
  render();
},{passive:false});

// ── SAVE ──────────────────────────────────────────────────────
async function saveToServer() {
  const key=COLOR_KEY[document.getElementById('colorPicker').value];
  const rects=frames.map(f=>[Math.round(f.x),Math.round(f.y),Math.round(f.w),Math.round(f.h)]);
  st('⏳ Saving...','warn');
  try{
    const res=await fetch('/api/save-bloom-rects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({color:key,rects})});
    const text=await res.text();
    let data;try{data=JSON.parse(text);}catch(e){throw new Error(text.slice(0,80));}
    if(!data.ok)throw new Error(data.error);
    st('✅ '+data.message,'ok');
  }catch(e){st('❌ '+e.message,'err');}
}
function downloadJSON() {
  const color=document.getElementById('colorPicker').value;
  const key=COLOR_KEY[color];
  const out={color:key,frames:frames.length,rects:frames.map(f=>[Math.round(f.x),Math.round(f.y),Math.round(f.w),Math.round(f.h)]),durations:frames.map(f=>f.dur||90)};
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(out,null,2));
  a.download='bloom_rects_'+color+'.json'; a.click();
}

// ── UTIL ──────────────────────────────────────────────────────
function st(msg,type){const e=document.getElementById('tbStatus');e.textContent=msg;e.className=type||'';}
function onZoomChange(){zoom=(parseInt(document.getElementById('zoomIn').value)||50)/100;render();}
function onColorChange(){frames=[];selIdx=-1;}

// ── INIT ──────────────────────────────────────────────────────
loadSheet();
</script>
